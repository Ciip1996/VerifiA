name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (typecheck + lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: verifia
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: verifia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://verifia:testpass@localhost:5432/verifia_test

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://verifia:testpass@localhost:5432/verifia_test

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://verifia:testpass@localhost:5432/verifia_test
          NODE_ENV: test
          JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM || 'TEST_KEY_PLACEHOLDER' }}
          JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM || 'TEST_KEY_PLACEHOLDER' }}
          VERIFIA_SKIP_ATTEST: 'true'
          TOKEN_TTL_SECONDS: '300'
          JWT_ISSUER: 'https://api.verifia.dev'

  # ─── Portal ────────────────────────────────────────────────────────────────
  portal:
    name: Portal (typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/portal

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001
          VITE_VERIFIER_API_KEY: ci-test-key

  # ─── Shared types ──────────────────────────────────────────────────────────
  shared:
    name: Shared (typecheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/shared

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Type check
        run: npm run typecheck

  # ─── Flutter ───────────────────────────────────────────────────────────────
  flutter:
    name: Flutter (analyze + test)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
        env:
          VERIFIA_SKIP_ATTEST: 'true'
          VERIFIA_API_URL: 'http://localhost:3001'
